name: Offline Evals

# Disabled — trigger manually from the Actions tab if needed.
# To re-enable automatic runs on every PR to main:
#   1. Change the trigger to:
#        on:
#          pull_request:
#            branches: [main]
#   2. Add these secrets to your repo (Settings → Secrets → Actions):
#        ANTHROPIC_API_KEY, LANGSMITH_API_KEY, LANGSMITH_PROJECT,
#        LANGSMITH_WORKSPACE_ID, DEMO_USER
#   Note: run `python -m scripts.setup` locally first so the dataset exists.
on:
  workflow_dispatch:

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run offline evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_TRACING: "true"
          LANGCHAIN_TRACING_V2: "true"
          LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
          LANGSMITH_WORKSPACE_ID: ${{ secrets.LANGSMITH_WORKSPACE_ID }}
          DEMO_USER: ${{ secrets.DEMO_USER }}
        run: |
          uv run python -m scripts.run_evals --skip-dataset --threshold 0.8

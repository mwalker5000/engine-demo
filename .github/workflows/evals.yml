name: Offline Evals

# Currently disabled from running automatically on PRs.
# To enable: change the trigger back to:
#   on:
#     pull_request:
#       branches: [main]
#
# Before enabling, add these secrets to your repo (Settings → Secrets → Actions):
#   ANTHROPIC_API_KEY, LANGSMITH_API_KEY, LANGSMITH_WORKSPACE_ID,
#   LANGSMITH_PROJECT, DEMO_USER
on:
  workflow_dispatch:

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_TRACING: "true"
          LANGCHAIN_TRACING_V2: "true"
          LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
          LANGSMITH_WORKSPACE_ID: ${{ secrets.LANGSMITH_WORKSPACE_ID }}
          DEMO_USER: ${{ secrets.DEMO_USER }}
        run: |
          python -m scripts.run_evals --skip-dataset --threshold 0.8
